<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bigger Projects — The Tiny Tasks</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--cream);
            min-height: 100vh;
            color: var(--ink);
        }

        /* ── Header (matches main dashboard exactly) ── */
        .main-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 72px;
            background: var(--cream);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2.5rem;
            z-index: 100;
        }

        .logo a { text-decoration: none; }

        .logo h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 600;
            font-style: italic;
            letter-spacing: 0.01em;
            text-transform: lowercase;
            color: var(--ink);
        }

        .main-nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .main-nav a {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink);
            text-decoration: none;
            opacity: 0.45;
            transition: opacity 0.3s ease;
        }

        .main-nav a:hover { opacity: 1; }
        .main-nav a.active { opacity: 1; }

        /* ── Page layout ── */
        .page-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 6rem 2.5rem 6rem;
        }

        .page-header {
            margin-bottom: 3rem;
        }

        .section-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--terra);
            display: block;
            margin-bottom: 0.75rem;
        }

        .page-header h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(2.25rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.1;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .page-header p {
            font-size: 0.9rem;
            color: var(--ink);
            opacity: 0.5;
            line-height: 1.6;
        }

        /* ── Projects grid ── */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.75rem;
        }

        /* ── Project card ── */
        .project-card {
            background: #FDFAF6;
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(43, 42, 40, 0.05);
            overflow: hidden;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        box-shadow 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(43, 42, 40, 0.1);
        }

        /* ── Media area ── */
        .project-media {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--stone);
            overflow: hidden;
            position: relative;
        }

        .project-media img,
        .project-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .project-card:hover .project-media img,
        .project-card:hover .project-media video {
            transform: scale(1.03);
        }

        .project-media video { cursor: pointer; }

        /* ── Card body ── */
        .project-body {
            padding: 1.5rem;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 0.75rem;
        }

        .project-tag {
            font-family: 'Inter', sans-serif;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.3em 0.7em;
            border-radius: 100px;
            background: var(--stone);
            color: var(--olive-dark);
        }

        .project-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--ink);
            margin-bottom: 0.5rem;
            line-height: 1.25;
        }

        .project-description {
            font-size: 0.875rem;
            color: var(--ink);
            opacity: 0.6;
            line-height: 1.65;
            margin-bottom: 1.25rem;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--terra);
            text-decoration: none;
            transition: gap 0.2s ease, opacity 0.2s ease;
        }

        .project-link:hover {
            gap: 9px;
            opacity: 0.75;
        }

        .project-link svg { width: 13px; height: 13px; }

        /* ── States ── */
        .state-container {
            text-align: center;
            padding: 5rem 2rem;
        }

        .state-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 1.25rem;
            opacity: 0.3;
        }

        .state-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .state-body {
            font-size: 0.875rem;
            color: var(--ink);
            opacity: 0.5;
            max-width: 360px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ── Skeleton loader ── */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.75rem;
        }

        .skeleton-card {
            background: #FDFAF6;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .skeleton-media {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(90deg, var(--border) 25%, var(--stone) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
        }

        .skeleton-body { padding: 1.5rem; }

        .skeleton-line {
            height: 10px;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--border) 25%, var(--stone) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            margin-bottom: 10px;
        }

        .skeleton-line.short  { width: 35%; }
        .skeleton-line.medium { width: 65%; }
        .skeleton-line.long   { width: 90%; }
        .skeleton-line.title  { height: 18px; width: 75%; margin-bottom: 14px; }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @media (max-width: 768px) {
            .main-header { padding: 0 1.25rem; }
            .main-nav { display: none; }
            .page-content { padding: 5rem 1.25rem 4rem; }
            .projects-grid { grid-template-columns: 1fr; }
            .skeleton-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <a href="./index.html"><h2>the tiny tasks</h2></a>
        </div>
        <nav class="main-nav">
            <a href="./index.html#tools">Tools</a>
            <a href="./bigger-projects.html" class="active">Work</a>
            <a href="./about.html">About</a>
        </nav>
    </header>

    <main class="page-content">
        <div class="page-header">
            <span class="section-label">Portfolio</span>
            <h1>Bigger Projects</h1>
            <p>Full-scale work beyond the task toolkit</p>
        </div>

        <div id="projects-root"></div>
    </main>

    <script>
        const SANITY_PROJECT_ID = 'mcp0g14m';
        const SANITY_DATASET    = 'production';
        const SANITY_API_VER    = '2024-01-01';

        const GROQ_QUERY = encodeURIComponent(`
            *[_type == "project"] | order(order asc, _createdAt desc) {
                _id,
                title,
                description,
                "coverImageUrl": coverImage.asset->url,
                "coverVideoUrl": coverVideo.asset->url,
                projectUrl,
                tags
            }
        `);

        const API_URL = `https://${SANITY_PROJECT_ID}.apicdn.sanity.io/v${SANITY_API_VER}/data/query/${SANITY_DATASET}?query=${GROQ_QUERY}`;

        const root = document.getElementById('projects-root');

        function renderSkeletons(count = 3) {
            const grid = document.createElement('div');
            grid.className = 'skeleton-grid';
            for (let i = 0; i < count; i++) {
                grid.innerHTML += `
                    <div class="skeleton-card">
                        <div class="skeleton-media"></div>
                        <div class="skeleton-body">
                            <div class="skeleton-line short"></div>
                            <div class="skeleton-line title"></div>
                            <div class="skeleton-line long"></div>
                            <div class="skeleton-line medium"></div>
                        </div>
                    </div>`;
            }
            return grid;
        }

        function renderEmpty() {
            return `
                <div class="state-container">
                    <svg class="state-icon" viewBox="0 0 56 56" fill="none" stroke="#2B2A28" stroke-width="1.5">
                        <rect x="8" y="8" width="40" height="40" rx="8"/>
                        <path d="M18 28h20M18 20h20M18 36h12"/>
                    </svg>
                    <p class="state-title">No projects yet</p>
                    <p class="state-body">Add your first project in Sanity Studio — it'll appear here automatically.</p>
                </div>`;
        }

        function renderError(message) {
            return `
                <div class="state-container">
                    <svg class="state-icon" viewBox="0 0 56 56" fill="none" stroke="#B46B4E" stroke-width="1.5">
                        <circle cx="28" cy="28" r="20"/>
                        <path d="M28 18v12M28 34v2"/>
                    </svg>
                    <p class="state-title">Couldn't load projects</p>
                    <p class="state-body">${message}</p>
                </div>`;
        }

        function renderMedia(project) {
            if (project.coverVideoUrl) {
                return `<video src="${project.coverVideoUrl}" muted loop playsinline
                    onmouseenter="this.play()" onmouseleave="this.pause(); this.currentTime=0;"
                    poster="${project.coverImageUrl || ''}"></video>`;
            }
            if (project.coverImageUrl) {
                return `<img src="${project.coverImageUrl}" alt="${project.title}" loading="lazy">`;
            }
            return '';
        }

        function renderTags(tags) {
            if (!tags || tags.length === 0) return '';
            return `<div class="project-tags">${tags.map(t => `<span class="project-tag">${t}</span>`).join('')}</div>`;
        }

        function renderProjects(projects) {
            const grid = document.createElement('div');
            grid.className = 'projects-grid';
            grid.innerHTML = projects.map(p => `
                <div class="project-card">
                    ${p.coverImageUrl || p.coverVideoUrl
                        ? `<div class="project-media">${renderMedia(p)}</div>`
                        : ''}
                    <div class="project-body">
                        ${renderTags(p.tags)}
                        <h2 class="project-title">${p.title}</h2>
                        ${p.description ? `<p class="project-description">${p.description}</p>` : ''}
                        ${p.projectUrl ? `
                            <a href="${p.projectUrl}" target="_blank" rel="noopener" class="project-link">
                                Visit Project
                                <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2.5 10.5l8-8M5.5 2.5h5v5"/>
                                </svg>
                            </a>` : ''}
                    </div>
                </div>
            `).join('');
            return grid;
        }

        async function loadProjects() {
            root.appendChild(renderSkeletons(3));

            if (SANITY_PROJECT_ID === 'YOUR_PROJECT_ID') {
                root.innerHTML = renderEmpty();
                return;
            }

            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const projects = data.result || [];

                root.innerHTML = '';
                if (projects.length === 0) {
                    root.innerHTML = renderEmpty();
                } else {
                    root.appendChild(renderProjects(projects));
                }
            } catch (err) {
                console.error('Sanity fetch failed:', err);
                root.innerHTML = renderError('Check your Sanity project ID and CORS settings, then reload.');
            }
        }

        loadProjects();
    </script>
</body>
</html>
